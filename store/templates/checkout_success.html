{% extends 'base.html' %}
{% block title %}Order Placed{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col items-center justify-center px-4 py-8 bg-gray-50">

    <!-- Confirmation Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100 max-w-md text-center">

        <!-- Thank You Message -->
        <h2 class="text-2xl font-bold text-gray-900 mb-4">
            Thank you for your order, {{ order.name }}!
        </h2>

        <!-- Order ID -->
        <p class="text-gray-700 mb-6">
            Your order ID is <span class="font-semibold text-orange-500">#{{ order.id }}</span>.
        </p>

        <!-- Continue Shopping Button -->
        <a href="{% url 'home' %}"
           class="inline-block bg-orange-400 text-white font-semibold py-2.5 px-6 rounded-lg hover:bg-orange-500 shadow-md transition duration-200">
            Continue Shopping
        </a>
    </div>

</div>
{% endblock %}
