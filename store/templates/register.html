{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-6">

        <!-- Page Title -->
        <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">Register</h2>
        {% if messages %}
<div class="mb-4">

    {% for message in messages %}
        <p class="text-red-500 text-sm">{{ message }}</p>
    {% endfor %}
</div>
{% endif %}

        <!-- Registration Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" name="username" id="username" placeholder="Username"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition duration-200" required>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" placeholder="Email"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition duration-200" required>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" name="password" id="password" placeholder="Password"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 transition duration-200" required>
            </div>

            <button type="submit"
                    class="w-full bg-orange-400 text-white font-semibold py-2.5 rounded-lg hover:bg-orange-500 shadow-md transition duration-200">
                Register
            </button>

        </form>

        <!-- Login Link -->
        <p class="mt-4 text-center text-gray-500 text-sm">
            Already have an account?
            <a href="{% url 'login' %}" class="text-orange-400 hover:text-orange-500 font-medium">Login</a>
        </p>
    </div>
</div>
{% endblock %}
