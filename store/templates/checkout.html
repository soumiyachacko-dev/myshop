{% extends 'base.html' %}
{% block title %}Checkout{% endblock %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4">

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8 border border-gray-100">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">
            Checkout
        </h2>

        <!-- Total -->
        <h5 class="text-gray-700 text-lg mb-6 text-center">
            Total: <span class="font-semibold text-orange-500">₹{{ total }}</span>
        </h5>

        <!-- Form -->
        <form method="post"  class="space-y-4">
            {% csrf_token %}

            {{ form.as_p }}

            <!-- Place Order Button -->
            <button type="submit"
                class="w-full bg-orange-400 text-white font-semibold py-2.5 rounded-lg hover:bg-orange-500 shadow-md transition duration-200">
                Place Order
            </button>
        </form>

    </div>

</div>

{% endblock %}
