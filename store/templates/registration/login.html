{% extends 'base.html' %}

{% block content %}

<div class="min-h-[70vh] flex items-center justify-center px-4">

    <!-- Card -->
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-8 border border-gray-100">

        <!-- Title -->
        <h2 class="text-2xl font-bold text-center text-gray-900 mb-6">
            Login to Your Account
        </h2>

        <!-- Form -->
        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <input type="text" name="username" placeholder="Username"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 outline-none transition" required>
            </div>

            <!-- Password -->
            <div>
                <input type="password" name="password" placeholder="Password"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-300 focus:border-orange-400 outline-none transition" required>
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-orange-400 text-white font-semibold py-2.5 rounded-lg hover:bg-orange-500 transition duration-200">
                Login
            </button>

        </form>

        <!-- Extra Links -->
        <div class="text-center mt-5 text-sm text-gray-600">
            Don’t have an account?
            <a href="{% url 'register' %}" class="text-orange-500 font-medium hover:underline">
                Register
            </a>
        </div>

    </div>

</div>

{% endblock %}
